<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .light-trail-animation {
            width: 100%;
            height: 4px;
            background: rgba(0, 23, 54, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: 999px;
        }

        .light-trail-animation::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #001736, transparent);
            animation: light-trail 2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }

        @keyframes light-trail {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        .pulse-subtle {
            animation: pulse-subtle 3s ease-in-out infinite;
        }

        @keyframes pulse-subtle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .floating-element {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>

<!-- Micro-interaction Script -->
<script>
        // Simulate progress text updates for realism
        const statusTexts = [
            "Analyzing subject edge...",
            "Smoothing contours...",
            "Finalizing transparency...",
            "Optimizing image..."
        ];
        
        let currentIndex = 0;
        const subtextElement = document.querySelector('h2');
        
        if(subtextElement) {
            setInterval(() => {
                currentIndex = (currentIndex + 1) % statusTexts.length;
                subtextElement.style.opacity = '0';
                setTimeout(() => {
                    subtextElement.innerText = statusTexts[currentIndex];
                    subtextElement.style.opacity = '1';
                }, 300);
            }, 3000);
            
            subtextElement.style.transition = 'opacity 0.3s ease-in-out';
        }
    </script>
