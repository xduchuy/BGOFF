<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001736",
                        "inverse-on-surface": "#f2f1ed",
                        "inverse-surface": "#2f312e",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#efeeea",
                        "on-primary-fixed-variant": "#264778",
                        "on-primary-fixed": "#001b3d",
                        "surface-bright": "#faf9f5",
                        "secondary-container": "#e7e1ae",
                        "tertiary-fixed-dim": "#b7c9d5",
                        "on-primary-container": "#7594ca",
                        "surface-variant": "#e3e2df",
                        "surface-container-low": "#f4f4f0",
                        "error": "#ba1a1a",
                        "outline": "#747780",
                        "on-secondary-fixed": "#1e1c00",
                        "tertiary-container": "#1d2e37",
                        "secondary": "#636037",
                        "on-background": "#1b1c1a",
                        "primary-fixed": "#d6e3ff",
                        "on-error": "#ffffff",
                        "surface-dim": "#dbdad6",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#8496a0",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#43474f",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c4c6d0",
                        "surface-tint": "#405f91",
                        "tertiary-fixed": "#d3e5f1",
                        "surface-container-high": "#e9e8e4",
                        "surface-container-highest": "#e3e2df",
                        "on-surface": "#1b1c1a",
                        "surface": "#faf9f5",
                        "primary-container": "#002b5b",
                        "on-secondary-fixed-variant": "#4b4822",
                        "primary-fixed-dim": "#a9c7ff",
                        "secondary-fixed-dim": "#cdc897",
                        "background": "#faf9f5",
                        "on-tertiary-fixed-variant": "#384953",
                        "tertiary": "#081922",
                        "on-tertiary-fixed": "#0c1e26",
                        "on-secondary-container": "#67643b",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#eae4b1",
                        "inverse-primary": "#a9c7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "20px",
                        "base": "4px",
                        "gutter": "16px",
                        "safe-area-bottom": "34px",
                        "xs": "8px",
                        "md": "24px",
                        "xl": "48px",
                        "sm": "16px",
                        "lg": "32px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Geist"],
                        "body-lg": ["Geist"],
                        "body-sm": ["Geist"],
                        "button": ["Geist"],
                        "display-lg": ["Geist"],
                        "label-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "title-md": ["Geist"]
                    },
                    "fontSize": {
                        "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "button": ["16px", {"lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "30px", "fontWeight": "600"}],
                        "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Geist', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 43, 91, 0.05);
            border: 1px solid #E0F2FE;
        }
        .active-scale:active {
            transform: scale(0.96);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-lg border-b border-outline-variant/10 shadow-sm flex items-center justify-between px-container-margin h-16 w-full max-w-md mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="auto_fix_high">auto_fix_high</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight text-primary">ClearCut</h1>
</div>
<button class="bg-primary/5 hover:bg-primary/10 transition-colors rounded-full px-4 py-2 text-primary font-bold active-scale">
            Install
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-md px-container-margin pt-24 pb-32 flex flex-col justify-center items-center">
<!-- Error State Card -->
<div class="glass-card w-full rounded-[24px] p-8 flex flex-col items-center text-center">
<!-- Dynamic Info/Warning Icon -->
<div class="w-20 h-20 bg-primary/5 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="info" data-weight="fill" style="font-variation-settings: 'FILL' 1;">info</span>
</div>
<!-- Error Content -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-4">
                Oops! Something went wrong
            </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed mb-8">
                This image might be too large. Try a smaller photo or check if your browser supports this format.
            </p>
<!-- Primary Action -->
<button class="w-full h-[52px] bg-primary text-on-primary rounded-full font-button text-button shadow-lg active-scale transition-all duration-200">
                Try Again
            </button>
<!-- Secondary Support Link -->
<button class="mt-4 text-on-surface-variant font-label-md text-label-md uppercase tracking-widest hover:text-primary transition-colors">
                Contact Support
            </button>
</div>
<!-- Decorative Subtle Background Element -->
<div class="fixed -z-10 bottom-0 left-0 w-full h-1/2 opacity-20 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-t from-primary-fixed to-transparent"></div>
</div>
</main>
<!-- Bottom Navigation Shell (Contextual Suppression Avoided here for visual complete-ness as per UI instructions, but styled specifically) -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex justify-around items-center px-4 py-2 w-[90%] max-w-sm bg-surface-container-high/90 backdrop-blur-xl border border-white/20 shadow-xl rounded-full">
<button class="text-on-surface-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all active-scale">
<span class="material-symbols-outlined" data-icon="ink_eraser">ink_eraser</span>
</button>
<button class="text-on-surface-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all active-scale">
<span class="material-symbols-outlined" data-icon="wallpaper">wallpaper</span>
</button>
<button class="bg-primary text-on-primary rounded-full p-3 active-scale transition-all duration-200">
<span class="material-symbols-outlined" data-icon="download">download</span>
</button>
<button class="text-on-surface-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all active-scale">
<span class="material-symbols-outlined" data-icon="restart_alt">restart_alt</span>
</button>
</nav>
<script>
        // Micro-interaction for the "Try Again" button
        const tryAgainBtn = document.querySelector('button.bg-primary');
        if(tryAgainBtn) {
            tryAgainBtn.addEventListener('click', function() {
                this.classList.add('opacity-80');
                setTimeout(() => {
                    this.classList.remove('opacity-80');
                }, 200);
            });
        }
    </script>
</body></html>
