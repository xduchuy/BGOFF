<style>

            background-image:

                linear-gradient(45deg, transparent 75%, #f0f0f0 75%), 
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);

            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

            transform: scale(1.1);
        }

                        "on-error": "#ffffff",
                        "surface-dim": "#dbdad6",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#8496a0",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#43474f",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c4c6d0",

                    "spacing": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-lg overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-lg border-b border-outline-variant/10 shadow-sm">
<div class="flex items-center justify-between px-container-margin h-16 w-full max-w-md mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="auto_fix_high">auto_fix_high</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight text-primary dark:text-primary-fixed-dim">ClearCut</h1>
</div>
<button class="bg-primary/5 hover:bg-primary/10 transition-colors px-4 py-2 rounded-full font-label-md text-label-md text-primary active:scale-95 transition-transform duration-150">
                Install
            </button>
</div>
</header>
<!-- Main Canvas -->
<main class="pt-24 pb-40 px-container-margin flex flex-col items-center min-h-screen max-w-md mx-auto">
<!-- Image Preview Card -->
<div class="w-full flex-1 flex flex-col gap-lg">
<div class="relative w-full aspect-[4/5] rounded-[32px] overflow-hidden bg-white shadow-[0_10px_30px_rgba(0,43,91,0.05)] border border-[#E0F2FE]">
<!-- Workspace grid background for transparency context -->
<div class="absolute inset-0 workspace-grid opacity-30"></div>
<!-- The User's Image -->
<img alt="Original Photo" class="relative z-10 w-full h-full object-cover" data-alt="A professional studio portrait of a stylish young woman with intricate curly hair, wearing a modern minimalist linen jacket. She is positioned against a soft, neutral-toned interior background with gentle sunlight filtering through a window, creating subtle shadows and highlights. The photo is crisp and high-resolution, maintaining a clean and premium professional aesthetic consistent with a high-end photography tool." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXUX86vq5gyw63ndEFfwJkAHOjtVzjCkWXnJWXAXOPG0vkvmJUOvkH_2sgNKs94ljiRmpTGfLV5uYn-uReMxHbgFZSLrlWVgvjTuJ-NzWFOShEjdC93R-cJ7voo9sLEEd7T2-aEQR10Qc5Ua21RGFphBlNUTFj5LnKbiRU2GgEWvBnxIt4hHb1LKPm6cJggy7Q3RlrhnggS4Q8hWJ7tQ3u4DK7-4k93xAKQaNfwUE8LftVUQWhj1gsli0cassveUcJ3f-I0wmgLw"/>
<!-- Badge for "Original" -->
<div class="absolute top-4 left-4 z-20 px-3 py-1 bg-primary/80 backdrop-blur-md rounded-full">
<span class="font-label-md text-label-md text-white uppercase tracking-widest">Original</span>
</div>
</div>
<!-- Primary Action -->
<div class="flex flex-col gap-sm w-full">
<button class="group relative flex items-center justify-center gap-3 w-full h-[58px] bg-primary text-white font-button text-button rounded-[24px] shadow-lg active:scale-[0.98] transition-all overflow-hidden">
<span class="material-symbols-outlined" data-icon="ink_eraser">ink_eraser</span>
<span>Remove Background</span>
<!-- Shine Effect -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
</button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant px-md">
                    AI-powered precision. Tap to isolate your subject in seconds.
                </p>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex justify-around items-center px-4 py-2 w-[90%] max-w-sm bg-surface-container-high/90 dark:bg-surface-container-highest/90 backdrop-blur-xl rounded-full border border-white/20 shadow-xl">
<!-- Tab: Remove (Active) -->
<button class="flex flex-col items-center justify-center gap-1 group active:scale-110 transition-all duration-200">
<div class="bg-primary dark:bg-primary-fixed text-on-primary dark:text-on-primary-fixed rounded-full p-3 transition-colors">
<span class="material-symbols-outlined block" data-icon="ink_eraser">ink_eraser</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">Remove</span>
</button>
<!-- Tab: Edit Background -->
<button class="flex flex-col items-center justify-center gap-1 group active:scale-110 transition-all duration-200">
<div class="text-on-surface-variant dark:text-outline-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all">
<span class="material-symbols-outlined block" data-icon="wallpaper">wallpaper</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Edit</span>
</button>
<!-- Tab: Download -->
<button class="flex flex-col items-center justify-center gap-1 group active:scale-110 transition-all duration-200">
<div class="text-on-surface-variant dark:text-outline-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all">
<span class="material-symbols-outlined block" data-icon="download">download</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Export</span>
</button>
<!-- Tab: Reset -->
<button class="flex flex-col items-center justify-center gap-1 group active:scale-110 transition-all duration-200">
<div class="text-on-surface-variant dark:text-outline-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all">
<span class="material-symbols-outlined block" data-icon="restart_alt">restart_alt</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Reset</span>
</button>
</nav>
<!-- Visual Polish: Soft Glow background elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary-container/10 rounded-full blur-[120px] -z-10"></div>
<script>
        // Micro-interactions
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('touchend', () => {
                button.classList.remove('scale-95');
            });
        });

        // Background removing simulation interaction
        const removeBtn = document.querySelector('button.bg-primary');
        removeBtn.addEventListener('click', () => {
            removeBtn.innerHTML = `
                <div class="flex items-center gap-3">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Processing...</span>
                </div>
            `;
            setTimeout(() => {
                removeBtn.innerHTML = `
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    <span>Done!</span>
                `;
                removeBtn.classList.replace('bg-primary', 'bg-green-600');
            }, 1800);
        });
    </script>
</body></html>
