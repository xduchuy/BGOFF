<html class="light" lang="en"><head>

<style>
        @font-face {
            font-family: 'Geist';
            src: url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        }
        body {
            font-family: 'Geist', sans-serif;
            background: linear-gradient(135deg, #faf9f5 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(224, 242, 254, 0.5);
            box-shadow: 0 10px 30px rgba(0, 43, 91, 0.05);
        }
        .transparency-grid {
            background-image: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%), 
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-lg shadow-sm border-b border-outline-variant/10">
<div class="flex items-center justify-between px-container-margin h-16 w-full max-w-md mx-auto pt-[env(safe-area-inset-top)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="auto_fix_high">auto_fix_high</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight text-primary dark:text-primary-fixed-dim">ClearCut</h1>
</div>
<button class="bg-primary text-on-primary font-button text-button px-4 py-2 rounded-full active:scale-95 transition-transform duration-150">
                Install
            </button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin pt-24 pb-32 max-w-md mx-auto w-full">
<!-- Hero/Upload Section -->
<div class="w-full glass-card rounded-[32px] p-8 flex flex-col items-center text-center animate-in fade-in zoom-in duration-700">
<!-- Icon Area -->
<div class="w-24 h-24 rounded-3xl transparency-grid border border-outline-variant/30 flex items-center justify-center mb-6 relative overflow-hidden group">
<span class="material-symbols-outlined text-4xl text-primary/40 group-hover:scale-110 transition-transform duration-300" data-icon="ink_eraser">ink_eraser</span>
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
<!-- Text Content -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">Drop photo here or select</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-8">Supports JPG, PNG, WebP</p>
<!-- CTA Button -->
<button class="w-full h-[52px] bg-primary text-on-primary font-button text-button rounded-[24px] flex items-center justify-center gap-2 shadow-lg active:scale-[0.98] transition-all hover:bg-primary-container">
<span class="material-symbols-outlined" data-icon="add_photo_alternate">add_photo_alternate</span>
                Select Photo
            </button>
</div>
<!-- Quick Tips Bento Snippet -->
<div class="w-full mt-gutter grid grid-cols-2 gap-4">
<div class="glass-card p-4 rounded-[24px] flex flex-col gap-2">
<span class="material-symbols-outlined text-primary/60" data-icon="bolt">bolt</span>
<p class="font-label-md text-label-md text-primary uppercase tracking-widest">Instant</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Remove backgrounds in 3 seconds.</p>
</div>
<div class="glass-card p-4 rounded-[24px] flex flex-col gap-2">
<span class="material-symbols-outlined text-primary/60" data-icon="hd">hd</span>
<p class="font-label-md text-label-md text-primary uppercase tracking-widest">HQ Output</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Full resolution export included.</p>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex justify-around items-center px-4 py-2 w-[90%] max-w-sm bg-surface-container-high/90 dark:bg-surface-container-highest/90 backdrop-blur-xl border border-white/20 shadow-xl rounded-full">
<!-- Home (Active) -->
<a class="bg-primary dark:bg-primary-fixed text-on-primary dark:text-on-primary-fixed rounded-full p-3 active:scale-110 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="ink_eraser">ink_eraser</span>
</a>
<!-- Wallpapers -->
<a class="text-on-surface-variant dark:text-outline-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all active:scale-110" href="#">
<span class="material-symbols-outlined" data-icon="wallpaper">wallpaper</span>
</a>
<!-- Downloads -->
<a class="text-on-surface-variant dark:text-outline-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all active:scale-110" href="#">
<span class="material-symbols-outlined" data-icon="download">download</span>
</a>
<!-- History/Reset -->
<a class="text-on-surface-variant dark:text-outline-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all active:scale-110" href="#">
<span class="material-symbols-outlined" data-icon="restart_alt">restart_alt</span>
</a>
</nav>
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-100/30 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<script>
        // Simple micro-interaction for the upload card
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            if(window.innerWidth > 768) {
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // Handle Active State for Nav (Semantic Mapping)
        // Since we are on "Home/Empty State", the first icon (ink_eraser) is active as per JSON mapping logic.
    </script>
</body></html>
