<style>

        }

            scrollbar-width: none;

<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-lg border-b border-outline-variant/10 shadow-sm flex items-center justify-between px-container-margin h-16 max-w-md mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight text-primary">ClearCut</h1>
</div>
<button class="bg-primary/5 px-4 py-2 rounded-full font-button text-button text-primary hover:bg-primary/10 transition-colors active:scale-95 duration-150">
            Install
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md pt-20 pb-40 px-container-margin flex flex-col gap-lg">
<!-- Result Card -->
<div class="relative w-full aspect-square rounded-[32px] overflow-hidden bg-white border border-[#E0F2FE] shadow-[0_10px_30px_rgba(0,43,91,0.05)] transition-all duration-500 ease-out">
<!-- Transparency Workspace Layer -->
<div class="w-full h-full transparency-grid flex items-center justify-center p-md" id="resultCanvas">
<img alt="Product subject" class="max-w-[90%] max-h-[90%] object-contain drop-shadow-2xl transition-transform duration-300 hover:scale-105" data-alt="A professional studio product photograph of a sleek, high-tech athletic sneaker isolated perfectly from its original background. The shoe is positioned dynamically, showing fine textures of the mesh and leather. It sits centered on a minimalist light-grey and white checkered transparency grid. The lighting is crisp and balanced, highlighting the modern contours of the footwear in a premium, creative tool interface style." id="subjectImage" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMdWTPA5CKz-_p7mYb-H8Qe8ED5oehMMudhlME1EW0I-e_XSmFqzXuG1dzjFhJb7PvUwFF-m5XL71ERqqCO1SSmFueJmDKfnILhoulZmEVHPDqrElfWxyQxCR8gcpYJIK9bk3fUMBmFGHvf5xsZ1az3K75UxZhOv-Uex7ISFK1gUQkax9jKDKOJrur1kvCmQ5bOAHeb0RoBfGv2mfJ7KwpiGatpIjzg9HLHYZmmv18ZwX30eGMsJhrn77yZLRo_KfKcSQ1m8Vvhg"/>
</div>
<!-- Floating Indicator -->
<div class="absolute top-4 left-4 bg-primary text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg">
                Subject Isolated
            </div>
</div>
<!-- Presets Row -->
<div class="flex flex-col gap-sm">
<h3 class="font-title-md text-title-md text-on-surface px-1">Background Presets</h3>
<div class="flex gap-sm overflow-x-auto hide-scrollbar py-2 -mx-2 px-2">
<!-- Transparent -->
<button class="preset-btn flex-shrink-0 flex flex-col items-center gap-xs focus:outline-none" onclick="changeBg('transparent')">
<div class="w-16 h-16 rounded-2xl transparency-grid border-2 border-primary shadow-md ring-2 ring-primary/20 transition-all"></div>
<span class="font-label-md text-label-md text-primary">Transparent</span>
</button>
<!-- White -->
<button class="preset-btn flex-shrink-0 flex flex-col items-center gap-xs focus:outline-none" onclick="changeBg('white')">
<div class="w-16 h-16 rounded-2xl bg-white border border-outline-variant/30 hover:scale-105 transition-all"></div>
<span class="font-label-md text-label-md text-on-surface-variant">White</span>
</button>
<!-- Black -->
<button class="preset-btn flex-shrink-0 flex flex-col items-center gap-xs focus:outline-none" onclick="changeBg('black')">
<div class="w-16 h-16 rounded-2xl bg-[#1b1c1a] border border-outline-variant/30 hover:scale-105 transition-all"></div>
<span class="font-label-md text-label-md text-on-surface-variant">Black</span>
</button>

<span class="font-label-md text-label-md text-on-surface-variant">Blue-Cream</span>
</button>

<span class="material-symbols-outlined text-outline">palette</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Custom</span>
</button>
</div>
</div>

<button class="text-on-surface-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all active:scale-110">
<span class="material-symbols-outlined">download</span>
</button>
<button class="text-on-surface-variant p-3 hover:bg-surface-variant/50 rounded-full transition-all active:scale-110">
<span class="material-symbols-outlined">restart_alt</span>
</button>
</nav>
<!-- Interactive Script -->
<script>
        function changeBg(preset) {
            const canvas = document.getElementById('resultCanvas');
            const btns = document.querySelectorAll('.preset-btn .w-16');
            const labels = document.querySelectorAll('.preset-btn span');
            
            // Reset borders
            btns.forEach(b => {
                b.classList.remove('border-primary', 'ring-2', 'ring-primary/20');
                b.classList.add('border-outline-variant/30');
            });
            labels.forEach(l => {
                l.classList.remove('text-primary');
                l.classList.add('text-on-surface-variant');
            });

            // Apply selected
            const activeIdx = {
                'transparent': 0,
                'white': 1,
                'black': 2,
                'gradient': 3,
                'custom': 4
            }[preset];
            
            btns[activeIdx].classList.add('border-primary', 'ring-2', 'ring-primary/20');
            btns[activeIdx].classList.remove('border-outline-variant/30');
            labels[activeIdx].classList.add('text-primary');
            labels[activeIdx].classList.remove('text-on-surface-variant');

            // Change actual canvas
            canvas.className = 'w-full h-full flex items-center justify-center p-md transition-all duration-300';
            if (preset === 'transparent') {
                canvas.classList.add('transparency-grid');
            } else if (preset === 'white') {
                canvas.classList.add('bg-white');
            } else if (preset === 'black') {
                canvas.classList.add('bg-[#1b1c1a]');
            } else if (preset === 'gradient') {
                canvas.classList.add('blue-cream-gradient');
            } else if (preset === 'custom') {
                canvas.classList.add('bg-tertiary-fixed');
            }
        }
    </script>
